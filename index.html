<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">

    <title>Caverna Do Dragão</title>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">

            <a class="navbar-brand" href="#">
                <img src="src/img/logo.png" alt="Logo" height="50">
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Onde Assistir</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Personagens</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Curiosidades</a>
                    </li>

                </ul>
            </div>

        </div>
    </nav>

    <!-- Hero -->
    <section id="hero">
        <!-- Carrossel -->
        <div id="carouselExampleSlidesOnly"
             class="carousel slide carousel-fade"
             data-bs-ride="carousel">

            <div class="carousel-inner">

                <div class="carousel-item active">
                    <img src="/src/img/img-fundo.png"
                         class="d-block w-100"
                         alt="Caverna do Dragão">
                </div>

                <div class="carousel-item">
                    <img src="/src/img/scooby-doo.webp"
                         class="d-block w-100"
                         alt="Imagem 2">
                </div>

                <div class="carousel-item">
                    <img src="/src/img/imagem3.png"
                         class="d-block w-100"
                         alt="Imagem 3">
                </div>
            </div>
        </div>

        <!-- Texto -->
        <div class="hero-content">
            <div class="hero-text">
                <img class="logo-desenho" src="/src/img/logo.png" alt="caverna-do-dragao">
            </div>

            <p id="descricao" class="lead">Embarque em uma jornada inesquecível com seis jovens amigos que são transportados para um mundo mágico repleto de perigos, enigmas e escolhas que podem levá-los para casa!</p>
            
            <button class="btn btn-danger btn lang">ASSISTIR</button>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
